# ============================
# DATASOURCE
# ============================
# JDBC connection URL to the PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
# Database username
spring.datasource.username=ecom_user
# Database password
spring.datasource.password=Dilhara3132
# Fully qualified class name of the PostgreSQL JDBC driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================
# JPA / HIBERNATE
# ============================
# ddl-auto=update tells Hibernate to compare the entity classes with the existing
# database schema and only apply changes (add new tables/columns). It never drops
# existing tables or data. NEVER use ddl-auto=create if you have existing data,
# because it will drop all tables and re-create them, wiping your data.
spring.jpa.hibernate.ddl-auto=update
# Logs every SQL statement executed by Hibernate to the console (useful for debugging)
spring.jpa.show-sql=true
# Pretty-prints the logged SQL statements with indentation and line breaks
spring.jpa.properties.hibernate.format_sql=true
# Tells Hibernate which SQL dialect to use for PostgreSQL-specific features
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================
# SERVER
# ============================
# Port the embedded Tomcat server listens on
server.port=8080

# ============================
# JWT
# ============================
# Secret key used to sign and verify JWT tokens (must be at least 256 bits / 64 hex chars)
jwt.secret=b07c06993e809d2cbf5989d3dbf34b15286fbd13ba8777da9485245601e77b8b
# This is 24 hours in milliseconds (24 x 60 x 60 x 1000)
jwt.expiration=86400000

# ============================
# FILE UPLOAD
# ============================
# Enables multipart file upload support
spring.servlet.multipart.enabled=true
# Maximum size allowed per file (product images up to 10 MB)
spring.servlet.multipart.max-file-size=10MB
# Maximum size allowed for the entire multipart request
spring.servlet.multipart.max-request-size=10MB

# ============================
# CORS
# ============================
# Comma-separated list of origins allowed to make cross-origin requests (React dev server)
app.cors.allowed-origins=http://localhost:5173

# ============================
# LOGGING
# ============================
# Shows security decisions (authentication, authorization) in the console. Remove in production.
logging.level.org.springframework.security=DEBUG
